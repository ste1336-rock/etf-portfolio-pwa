<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ETF追蹤">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<title>ETF 投資追蹤</title>
<style>
  :root {
    --green: #16A34A;
    --green-dark: #15803D;
    --red: #EF4444;
    --gray: #6B7280;
    --bg: #F3F4F6;
    --card: #FFFFFF;
    --text: #111827;
    --border: #E5E7EB;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { font-size: 16px; }
  body {
    font-family: -apple-system, "PingFang TC", "Noto Sans TC", "Helvetica Neue", sans-serif;
    background: var(--bg); color: var(--text);
    padding-bottom: calc(72px + env(safe-area-inset-bottom));
    -webkit-font-smoothing: antialiased;
  }
  header {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg);
    padding: calc(12px + env(safe-area-inset-top)) 16px 8px;
    display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { font-size: 1.35rem; font-weight: 700; }
  #btn-refresh {
    border: none; background: var(--card); color: var(--green);
    width: 40px; height: 40px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 1px 3px rgba(0,0,0,.08); cursor: pointer;
  }
  #btn-refresh.spinning svg { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #sync-status { font-size: .75rem; color: var(--gray); padding: 0 16px 8px; min-height: 1.1em; }
  main { padding: 0 16px 16px; display: none; }
  main.active { display: block; }

  .card {
    background: var(--card); border-radius: 16px; padding: 16px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06); margin-bottom: 12px;
  }
  .asset-card {
    background: linear-gradient(135deg, #16A34A, #15803D);
    color: #fff; border-radius: 18px; padding: 18px 16px; margin-bottom: 12px;
    box-shadow: 0 4px 14px rgba(22,163,74,.25);
  }
  .asset-card .label { font-size: .8rem; opacity: .85; }
  .asset-card .total { font-size: 2rem; font-weight: 800; letter-spacing: -.5px; margin: 2px 0 10px; }
  .asset-card .row { display: flex; gap: 16px; }
  .asset-card .row > div { flex: 1; }
  .asset-card .sub-label { font-size: .72rem; opacity: .8; }
  .asset-card .sub-value { font-size: 1rem; font-weight: 700; }
  .asset-card .warn { margin-top: 10px; font-size: .72rem; background: rgba(255,255,255,.18); border-radius: 8px; padding: 6px 8px; }

  .section-title { font-size: .95rem; font-weight: 700; margin: 16px 0 8px; }

  /* 退休頁 */
  .ret-hero { background: linear-gradient(135deg,#16A34A,#15803D); color:#fff; border-radius:18px; padding:18px 16px; margin-bottom:12px; box-shadow:0 4px 14px rgba(22,163,74,.25); }
  .ret-hero .label { font-size:.8rem; opacity:.85; }
  .ret-hero .big { font-size:2rem; font-weight:800; letter-spacing:-.5px; margin:2px 0; }
  .ret-hero .target { font-size:.8rem; opacity:.85; margin-bottom:10px; }
  .progress { height:12px; background:rgba(255,255,255,.25); border-radius:6px; overflow:hidden; }
  .progress > span { display:block; height:100%; background:#fff; border-radius:6px; }
  .ret-hero .pctline { display:flex; justify-content:space-between; font-size:.9rem; font-weight:700; margin-top:8px; }
  .ret-hero .remain { font-size:.78rem; opacity:.92; margin-top:4px; }
  .donut-wrap { display:flex; align-items:center; gap:16px; }
  .donut-wrap .legend { flex:1; font-size:.82rem; color:var(--gray); line-height:1.7; }
  .donut-wrap .legend b { color:var(--text); }
  .countdown { display:flex; gap:10px; text-align:center; }
  .countdown > div { flex:1; }
  .countdown .num { font-size:1.3rem; font-weight:800; }
  .countdown .cap { font-size:.7rem; color:var(--gray); margin-top:2px; }
  .three { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1px; background:var(--border); border-radius:14px; overflow:hidden; }
  .three > div { background:var(--card); padding:12px 10px; text-align:center; }
  .three .k { font-size:.7rem; color:var(--gray); }
  .three .v { font-size:1.05rem; font-weight:800; margin-top:3px; }
  .holding {
    background: var(--card); border-radius: 14px; padding: 12px 14px; margin-bottom: 10px;
    box-shadow: 0 1px 3px rgba(0,0,0,.05);
  }
  .holding .top { display: flex; justify-content: space-between; align-items: baseline; }
  .holding .symbol { font-weight: 800; font-size: 1.02rem; }
  .holding .name { font-size: .72rem; color: var(--gray); margin-top: 1px; }
  .holding .pl { text-align: right; font-weight: 700; font-size: .95rem; white-space: nowrap; }
  .holding .pl-pct { font-size: .75rem; font-weight: 600; }
  .holding .mid { display: flex; justify-content: space-between; margin-top: 8px; font-size: .78rem; color: var(--gray); }
  .holding .mv { font-weight: 700; color: var(--text); }
  .holding .price-line { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; font-size: .72rem; color: var(--gray); }
  .up { color: var(--green); }
  .down { color: var(--red); }
  .badge-stale {
    display: inline-block; background: #FEF3C7; color: #B45309;
    font-size: .65rem; border-radius: 6px; padding: 1px 6px; margin-left: 6px; font-weight: 600;
  }
  .badge-noprice {
    display: inline-block; background: #FEE2E2; color: #B91C1C;
    font-size: .65rem; border-radius: 6px; padding: 1px 6px; margin-left: 6px; font-weight: 600;
  }
  .empty { text-align: center; color: var(--gray); padding: 48px 16px; font-size: .9rem; }

  .tx-row { background: var(--card); border-radius: 14px; padding: 12px 14px; margin-bottom: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
  .tx-row .line1 { display: flex; justify-content: space-between; align-items: center; }
  .tx-row .sym { font-weight: 700; }
  .tx-badge { font-size: .65rem; background: #DCFCE7; color: var(--green-dark); border-radius: 6px; padding: 1px 6px; margin-left: 6px; font-weight: 700; }
  .tx-row .amount { font-weight: 700; }
  .tx-row .line2 { display: flex; justify-content: space-between; margin-top: 4px; font-size: .74rem; color: var(--gray); }
  .tx-row .note { margin-top: 4px; font-size: .74rem; color: var(--gray); }

  form .field { margin-bottom: 12px; }
  form label { display: block; font-size: .78rem; color: var(--gray); margin-bottom: 4px; font-weight: 600; }
  form input, form select {
    width: 100%; padding: 12px; font-size: 1rem; border: 1px solid var(--border);
    border-radius: 12px; background: var(--card); color: var(--text); appearance: none;
  }
  form input:focus, form select:focus { outline: 2px solid var(--green); border-color: transparent; }
  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; }
  .seg { display: flex; background: #E5E7EB; border-radius: 12px; padding: 3px; margin-bottom: 14px; }
  .seg button {
    flex: 1; border: none; background: none; padding: 10px; font-size: 1rem; font-weight: 700;
    border-radius: 9px; color: var(--gray); cursor: pointer;
  }
  .seg button.on-buy { background: var(--green); color: #fff; }
  .seg button.on-sell { background: var(--red); color: #fff; }
  .avail-hint { font-size: .74rem; color: var(--gray); margin: -6px 0 12px; min-height: 1em; }
  .btn-primary {
    width: 100%; padding: 14px; font-size: 1.05rem; font-weight: 700;
    background: var(--green); color: #fff; border: none; border-radius: 14px; cursor: pointer;
  }
  .btn-primary:disabled { opacity: .5; }
  .btn-secondary {
    width: 100%; padding: 12px; font-size: .95rem; font-weight: 600;
    background: var(--card); color: var(--green); border: 1px solid var(--border);
    border-radius: 14px; cursor: pointer; margin-top: 10px;
  }
  .hint { font-size: .74rem; color: var(--gray); margin-top: 6px; line-height: 1.5; }
  .setup-banner {
    background: #FEF3C7; color: #92400E; border-radius: 12px; padding: 12px;
    font-size: .82rem; line-height: 1.6; margin-bottom: 14px;
  }

  nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
    background: var(--card); border-top: 1px solid var(--border);
    display: flex; padding-bottom: env(safe-area-inset-bottom);
  }
  nav button {
    flex: 1; border: none; background: none; padding: 8px 0 6px;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    font-size: .68rem; color: var(--gray); cursor: pointer; font-weight: 600;
  }
  nav button.active { color: var(--green); }
  nav button svg { width: 23px; height: 23px; }
  /* 點擊一律落在 button 本體，避免事件目標落在 SVG 子節點的邊角案例 */
  nav button svg, nav button *, #btn-refresh svg { pointer-events: none; }

  .holding { cursor: pointer; }
  .holding .chev { color: #C7CDD6; font-size: .9rem; margin-left: 4px; }
  .weight-bar { height: 5px; background: #E5E7EB; border-radius: 3px; margin-top: 8px; overflow: hidden; }
  .weight-bar > span { display: block; height: 100%; background: var(--green); border-radius: 3px; }
  .tx-row { cursor: pointer; }
  .btn-danger {
    width: 100%; padding: 12px; font-size: .95rem; font-weight: 700;
    background: #fff; color: var(--red); border: 1px solid #FECACA;
    border-radius: 14px; cursor: pointer; margin-top: 10px;
  }

  /* 明細 modal */
  #modal-overlay {
    position: fixed; inset: 0; z-index: 40; background: rgba(17,24,39,.45);
    display: none; align-items: flex-end; justify-content: center;
  }
  #modal-overlay.show { display: flex; }
  #modal {
    background: var(--bg); width: 100%; max-width: 560px;
    border-radius: 20px 20px 0 0; max-height: 88vh; overflow-y: auto;
    padding: 8px 16px calc(24px + env(safe-area-inset-bottom));
    animation: slideup .22s ease;
  }
  @keyframes slideup { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-grabber { width: 40px; height: 4px; background: #D1D5DB; border-radius: 2px; margin: 8px auto 12px; }
  .modal-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2px; }
  .modal-head .sym { font-size: 1.3rem; font-weight: 800; }
  .modal-head .close { border: none; background: none; font-size: 1.5rem; color: var(--gray); cursor: pointer; line-height: 1; }
  .modal-sub { font-size: .78rem; color: var(--gray); margin-bottom: 12px; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 12px; }
  .stat-grid > div { background: var(--card); padding: 12px 14px; }
  .stat-grid .k { font-size: .72rem; color: var(--gray); }
  .stat-grid .v { font-size: 1.02rem; font-weight: 700; margin-top: 2px; }
  .lot { background: var(--card); border-radius: 12px; padding: 10px 14px; margin-bottom: 8px; box-shadow: 0 1px 2px rgba(0,0,0,.04); }
  .lot .l1 { display: flex; justify-content: space-between; font-size: .82rem; }
  .lot .l2 { display: flex; justify-content: space-between; font-size: .74rem; color: var(--gray); margin-top: 3px; }

  #toast {
    position: fixed; left: 50%; bottom: calc(90px + env(safe-area-inset-bottom));
    transform: translateX(-50%); background: rgba(17,24,39,.92); color: #fff;
    padding: 10px 18px; border-radius: 12px; font-size: .85rem;
    opacity: 0; pointer-events: none; transition: opacity .25s; z-index: 50;
    max-width: 86vw; text-align: center;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <h1 id="view-title">總覽</h1>
  <button id="btn-refresh" type="button" aria-label="更新報價">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><polyline points="21 3 21 9 15 9"/></svg>
  </button>
</header>
<div id="sync-status"></div>

<main id="view-overview" class="active"></main>

<main id="view-transactions"></main>

<main id="view-add">
  <form id="add-form" novalidate>
    <div class="seg" id="type-seg">
      <button type="button" data-type="buy" class="on-buy">買入</button>
      <button type="button" data-type="sell">賣出</button>
    </div>
    <div class="field-row">
      <div class="field">
        <label for="f-symbol">ETF 代號</label>
        <input id="f-symbol" autocapitalize="characters" autocomplete="off" placeholder="VOO / 0050" required>
      </div>
      <div class="field">
        <label for="f-market">市場</label>
        <select id="f-market">
          <option value="US">美股</option>
          <option value="TW">台股</option>
        </select>
      </div>
    </div>
    <div class="avail-hint" id="avail-hint"></div>
    <div class="field">
      <label for="f-name">ETF 名稱（選填）</label>
      <input id="f-name" autocomplete="off" placeholder="Vanguard S&amp;P 500 ETF">
    </div>
    <div class="field">
      <label for="f-date">交易日期</label>
      <input id="f-date" type="date" required>
    </div>
    <div class="field-row">
      <div class="field">
        <label for="f-price">價格</label>
        <input id="f-price" inputmode="decimal" autocomplete="off" placeholder="620.00" required>
      </div>
      <div class="field">
        <label for="f-quantity">數量（股）</label>
        <input id="f-quantity" inputmode="decimal" autocomplete="off" placeholder="5" required>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label for="f-fee">手續費</label>
        <input id="f-fee" inputmode="decimal" autocomplete="off" placeholder="0" value="0">
      </div>
      <div class="field">
        <label for="f-tax" id="f-tax-label">稅（賣出用）</label>
        <input id="f-tax" inputmode="decimal" autocomplete="off" placeholder="0" value="0">
      </div>
    </div>
    <div class="field">
      <label for="f-currency">幣別</label>
      <select id="f-currency">
        <option value="USD">USD</option>
        <option value="TWD">TWD</option>
      </select>
    </div>
    <div class="field">
      <label for="f-note">備註（選填）</label>
      <input id="f-note" autocomplete="off" maxlength="200">
    </div>
    <button class="btn-primary" id="btn-save" type="submit">儲存買入紀錄</button>
    <button class="btn-danger" id="btn-delete" type="button" style="display:none">刪除這筆交易</button>
    <p class="hint" id="add-hint">第一版僅支援「買入」。賣出、股息、匯率換算為後續版本。</p>
  </form>
</main>

<main id="view-retirement"></main>

<main id="view-settings">
  <div id="setup-banner" class="setup-banner" style="display:none">
    尚未完成連線設定。請依 README 完成 Google Sheet 與 Apps Script 部署後，
    把「網頁應用程式 URL」與你設定的 Secret Key 填入下方並儲存。
  </div>
  <div class="card">
    <div class="section-title" style="margin-top:0">連線設定</div>
    <form id="settings-form" novalidate>
      <div class="field">
        <label for="s-api">Apps Script API 網址（/exec 結尾）</label>
        <input id="s-api" autocomplete="off" placeholder="https://script.google.com/macros/s/…/exec">
      </div>
      <div class="field">
        <label for="s-key">Secret Key</label>
        <input id="s-key" type="password" autocomplete="off" placeholder="與指令碼屬性 SECRET_KEY 相同">
      </div>
      <button class="btn-primary" type="submit">儲存設定</button>
      <button class="btn-secondary" id="btn-test" type="button">測試連線</button>
      <p class="hint">
        Key 只存在這支手機的瀏覽器裡（localStorage），不會寫進程式碼或上傳到 GitHub。<br>
        App 版本：<span id="app-version"></span>
      </p>
    </form>
  </div>
  <div class="card">
    <div class="section-title" style="margin-top:0">退休目標設定</div>
    <form id="retire-form" novalidate>
      <div class="field">
        <label for="r-target">退休目標金額（TWD）</label>
        <input id="r-target" inputmode="decimal" autocomplete="off" placeholder="20000000">
      </div>
      <div class="field-row">
        <div class="field">
          <label for="r-monthly">每月投入（TWD）</label>
          <input id="r-monthly" inputmode="decimal" autocomplete="off" placeholder="30000">
        </div>
        <div class="field">
          <label for="r-rate">預期年化報酬率（%）</label>
          <input id="r-rate" inputmode="decimal" autocomplete="off" placeholder="7">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label for="r-fx">USD → TWD 匯率</label>
          <input id="r-fx" inputmode="decimal" autocomplete="off" placeholder="32.5">
        </div>
        <div class="field">
          <label for="r-age">目標退休年齡（參考）</label>
          <input id="r-age" inputmode="numeric" autocomplete="off" placeholder="50">
        </div>
      </div>
      <div class="field">
        <label for="r-extra">額外資產／現金（TWD，選填）</label>
        <input id="r-extra" inputmode="decimal" autocomplete="off" placeholder="0">
      </div>
      <button class="btn-primary" type="submit">儲存退休設定</button>
      <p class="hint">
        匯率用來把美股資產與美元已實現獲利換算成台幣加總（標示為「估算」，非即時匯率）。<br>
        這些設定只存在本機瀏覽器，換裝置需重新填寫。
      </p>
    </form>
  </div>
</main>

<nav>
  <button data-view="overview" class="active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5 12 3l9 6.5V21a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/><path d="M9 22V12h6v10"/></svg>
    總覽
  </button>
  <button data-view="transactions">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    交易
  </button>
  <button data-view="add">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    新增
  </button>
  <button data-view="retirement">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/></svg>
    退休
  </button>
  <button data-view="settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.01a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.01a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    設定
  </button>
</nav>

<div id="modal-overlay">
  <div id="modal">
    <div class="modal-grabber"></div>
    <div id="modal-body"></div>
  </div>
</div>

<div id="toast"></div>

<script id="money-math">
/* ============================================================
 * 定點金額運算（BigInt，小數 8 位）
 * 金額一律「字串解析 → BigInt 定點運算 → 最後一步格式化」，
 * 全程不經過 IEEE 754 浮點數，避免 0.1+0.2 與長小數尾差問題。
 * 此區塊被 tests/money.test.mjs 抽出實跑測試，勿改動 script id。
 * ============================================================ */
'use strict';
const DEC_SCALE_DIGITS = 8;
const DEC_ONE = 10n ** BigInt(DEC_SCALE_DIGITS);
const DEC_ZERO = 0n;
const DEC_HUNDRED = 100n * DEC_ONE;

/** 數字字串/數字 → BigInt（×1e8）；格式無效回 null。超過 8 位小數以四捨五入截斷。 */
function decParse(value) {
  if (value === null || value === undefined) return null;
  let s = String(value).trim();
  if (s === '' || !/^-?\d+(\.\d+)?$/.test(s)) return null;
  let neg = false;
  if (s[0] === '-') { neg = true; s = s.slice(1); }
  const dot = s.indexOf('.');
  const intPart = dot === -1 ? s : s.slice(0, dot);
  const fracPart = dot === -1 ? '' : s.slice(dot + 1);
  let units = BigInt(intPart) * DEC_ONE +
    BigInt((fracPart + '0'.repeat(DEC_SCALE_DIGITS)).slice(0, DEC_SCALE_DIGITS));
  if (fracPart.length > DEC_SCALE_DIGITS && fracPart.charCodeAt(DEC_SCALE_DIGITS) >= 0x35) units += 1n;
  return neg ? -units : units;
}

/** n/d 四捨五入（half away from zero），d 必須 > 0n */
function decRoundDiv(n, d) {
  const neg = n < 0n;
  const nn = neg ? -n : n;
  let q = nn / d;
  if ((nn % d) * 2n >= d) q += 1n;
  return neg ? -q : q;
}

const decAdd = (a, b) => a + b;
const decSub = (a, b) => a - b;
const decMul = (a, b) => decRoundDiv(a * b, DEC_ONE);

function decDiv(a, b) {
  if (b === 0n) return null;
  const neg = (a < 0n) !== (b < 0n);
  const aa = a < 0n ? -a : a;
  const bb = b < 0n ? -b : b;
  const q = decRoundDiv(aa * DEC_ONE, bb);
  return neg ? -q : q;
}

/** 定點值 → 固定 dp 位小數字串（四捨五入），無千分位 */
function decToFixed(units, dp) {
  const scaled = decRoundDiv(units, 10n ** BigInt(DEC_SCALE_DIGITS - dp));
  const neg = scaled < 0n;
  const s = (neg ? -scaled : scaled).toString().padStart(dp + 1, '0');
  const intPart = dp === 0 ? s : s.slice(0, -dp);
  const fracPart = dp === 0 ? '' : s.slice(-dp);
  return (neg ? '-' : '') + intPart + (dp ? '.' + fracPart : '');
}

/** 定點值 → 千分位格式字串 */
function decFormat(units, dp = 2) {
  const fixed = decToFixed(units, dp);
  const neg = fixed.startsWith('-');
  const body = neg ? fixed.slice(1) : fixed;
  const dot = body.indexOf('.');
  const i = dot === -1 ? body : body.slice(0, dot);
  const f = dot === -1 ? '' : body.slice(dot + 1);
  const grouped = i.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return (neg ? '-' : '') + grouped + (f ? '.' + f : '');
}

/** 股數顯示：最多 4 位小數，去除尾端 0 */
function decFormatQty(units) {
  let s = decToFixed(units, 4);
  if (s.includes('.')) s = s.replace(/0+$/, '').replace(/\.$/, '');
  return s;
}

/* ============================================================
 * 投資組合計算引擎（純函式，被 tests/money.test.mjs 實跑）
 * 加權平均成本法；支援買入與賣出（部分/全部）。
 * ============================================================ */

/**
 * txs 每筆需含：symbol, currency, market, name, type('buy'|'sell'),
 *   tradeDate(數字), createdAt(數字), price, quantity, fee, tax。
 * priceMap: { SYMBOL: { price, updatedAt, dataSource, stale } }。
 * 回傳 { positions, skipped }。positions 含已結清（qty=0）者，其 realized 仍保留。
 */
function computePositions(txs, priceMap) {
  priceMap = priceMap || {};
  const groups = new Map();
  const skipped = [];
  const realizedEvents = []; // 每筆賣出一個事件（供賣出紀錄、本月/今年統計）
  for (const t of txs) {
    const q = decParse(t.quantity);
    const p = decParse(t.price);
    const f = decParse(t.fee === '' || t.fee == null ? '0' : t.fee);
    const tax = decParse(t.tax === '' || t.tax == null ? '0' : t.tax);
    if (q === null || p === null || f === null || tax === null || q <= 0n || p <= 0n || f < 0n || tax < 0n) {
      skipped.push(t.id); continue;
    }
    const key = t.symbol + '|' + t.currency;
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push({
      id: t.id, symbol: t.symbol, currency: t.currency, market: t.market, name: t.name || '',
      type: t.type === 'sell' ? 'sell' : 'buy',
      tradeDate: Number(t.tradeDate) || 0, createdAt: Number(t.createdAt) || 0,
      q, p, f, tax
    });
  }
  const positions = [];
  for (const list of groups.values()) {
    // 依交易日→建立時間排序，確保賣出時的平均成本用的是當下狀態
    list.sort((a, b) => (a.tradeDate - b.tradeDate) || (a.createdAt - b.createdAt));
    let qty = DEC_ZERO, cost = DEC_ZERO, buyFees = DEC_ZERO, buyTax = DEC_ZERO;
    let realized = DEC_ZERO, sellFees = DEC_ZERO, sellTax = DEC_ZERO;
    let boughtQty = DEC_ZERO, soldQty = DEC_ZERO, oversold = false;
    let name = '', market = '', symbol = '', currency = '';
    for (const t of list) {
      symbol = t.symbol; currency = t.currency; market = t.market; if (t.name) name = t.name;
      if (t.type === 'buy') {
        qty = decAdd(qty, t.q);
        // 成本基礎 = 價×量 + 買入手續費 + 買入稅（使用者裁決：取得成本併入）
        cost = decAdd(cost, decAdd(decAdd(decMul(t.p, t.q), t.f), t.tax));
        buyFees = decAdd(buyFees, t.f); // 仍分別記錄，供明細透明呈現
        buyTax = decAdd(buyTax, t.tax);
        boughtQty = decAdd(boughtQty, t.q);
      } else {
        let sq = t.q;
        if (sq > qty) { oversold = true; sq = qty; } // 不能賣超過持有，clamp 到持有量
        if (qty > 0n && sq > 0n) {
          const avg = decDiv(cost, qty);
          const costOfSold = decMul(avg, sq);
          const proceeds = decMul(t.p, sq);
          // Master Spec §5.2：已實現 = 賣出收入 − 對應成本 − 賣出手續費 − 賣出稅
          const eventPl = decSub(decSub(decSub(proceeds, costOfSold), t.f), t.tax);
          realized = decAdd(realized, eventPl);
          sellFees = decAdd(sellFees, t.f);
          sellTax = decAdd(sellTax, t.tax);
          qty = decSub(qty, sq);
          cost = decSub(cost, costOfSold);
          soldQty = decAdd(soldQty, sq);
          realizedEvents.push({
            id: t.id, symbol: t.symbol, currency: t.currency, market: t.market, name: t.name || '',
            tradeDate: t.tradeDate, createdAt: t.createdAt,
            sellQty: sq, sellPrice: t.p, avgCost: avg, buyCost: costOfSold, proceeds: proceeds,
            fee: t.f, tax: t.tax, realized: eventPl,
            realizedPct: costOfSold > 0n ? decMul(decDiv(eventPl, costOfSold), DEC_HUNDRED) : null
          });
        } else {
          oversold = true;
        }
      }
    }
    const pos = {
      symbol, currency, market, name,
      qty, cost, buyFees, buyTax, realized, sellFees, sellTax,
      feesAndTax: decAdd(decAdd(decAdd(buyFees, buyTax), sellFees), sellTax),
      boughtQty, soldQty, oversold,
      avgCost: qty > 0n ? decDiv(cost, qty) : DEC_ZERO,
      price: null
    };
    const px = priceMap[symbol];
    if (qty > 0n && px && px.price != null && decParse(px.price) !== null) {
      pos.price = decParse(px.price);
      pos.priceUpdatedAt = px.updatedAt;
      pos.priceStale = Boolean(px.stale);
      pos.dataSource = px.dataSource || '';
      pos.marketValue = decMul(pos.price, qty);
      pos.unrealized = decSub(pos.marketValue, cost);
      pos.unrealizedPct = cost > 0n ? decMul(decDiv(pos.unrealized, cost), DEC_HUNDRED) : null;
    }
    positions.push(pos);
  }
  positions.sort((a, b) => a.symbol < b.symbol ? -1 : a.symbol > b.symbol ? 1 : 0);
  return { positions, skipped, realizedEvents };
}

/** 依幣別彙總（跨幣別不相加）。含已實現、未實現、手續費/稅。 */
function summarizeCurrencies(positions) {
  const map = new Map();
  for (const pos of positions) {
    let s = map.get(pos.currency);
    if (!s) {
      s = { currency: pos.currency, invested: DEC_ZERO, marketValue: DEC_ZERO, pricedCost: DEC_ZERO,
            unrealized: DEC_ZERO, realized: DEC_ZERO, feesAndTax: DEC_ZERO,
            heldCount: 0, missingPriceCount: 0, hasStale: false, hasSell: false };
      map.set(pos.currency, s);
    }
    s.realized = decAdd(s.realized, pos.realized);
    s.feesAndTax = decAdd(s.feesAndTax, pos.feesAndTax);
    if (pos.soldQty > 0n) s.hasSell = true;
    if (pos.qty > 0n) {
      s.heldCount += 1;
      s.invested = decAdd(s.invested, pos.cost);
      if (pos.price !== null) {
        s.marketValue = decAdd(s.marketValue, pos.marketValue);
        s.pricedCost = decAdd(s.pricedCost, pos.cost);
        s.unrealized = decAdd(s.unrealized, pos.unrealized);
        if (pos.priceStale) s.hasStale = true;
      } else {
        s.missingPriceCount += 1;
      }
    }
  }
  const arr = [...map.values()];
  for (const s of arr) {
    s.unrealizedPct = s.pricedCost > 0n ? decMul(decDiv(s.unrealized, s.pricedCost), DEC_HUNDRED) : null;
  }
  arr.sort((a, b) => (a.currency === 'TWD' ? 0 : 1) - (b.currency === 'TWD' ? 0 : 1));
  return arr;
}

/* ============================================================
 * 退休/獲利：跨幣別換算與複利預估（純函式，被測試）
 * 換算成「基準幣別 TWD」時，USD 須乘上使用者提供的匯率，
 * 若無匯率則回 null（誠實：不換算、不假裝，對應 Master Spec §6）。
 * ============================================================ */

/** amountUnits(定點) + 幣別 → 換算成 TWD 定點值；USD 但無匯率時回 null。 */
function toTwdUnits(amountUnits, currency, fxUsdTwdUnits) {
  if (currency === 'TWD') return amountUnits;
  if (currency === 'USD') return fxUsdTwdUnits == null ? null : decMul(amountUnits, fxUsdTwdUnits);
  return null;
}

/**
 * 把所有 realizedEvents 換算成 TWD 並依期間彙總。
 * currentDateNum: 20260713；回 { month, year, all, fxMissing }。
 * 任一 USD 事件無匯率 → 該事件無法換算，fxMissing=true 且不計入（誠實標記）。
 */
function aggregateRealized(events, currentDateNum, fxUsdTwdUnits) {
  const yyyymm = Math.floor(currentDateNum / 100);      // 202607
  const yyyy = Math.floor(currentDateNum / 10000);      // 2026
  let month = DEC_ZERO, year = DEC_ZERO, all = DEC_ZERO, fxMissing = false;
  for (const e of events) {
    const twd = toTwdUnits(e.realized, e.currency, fxUsdTwdUnits);
    if (twd === null) { fxMissing = true; continue; }
    all = decAdd(all, twd);
    if (Math.floor(e.tradeDate / 10000) === yyyy) year = decAdd(year, twd);
    if (Math.floor(e.tradeDate / 100) === yyyymm) month = decAdd(month, twd);
  }
  return { month, year, all, fxMissing };
}

/**
 * 複利預估達標時間（估算值，非精確金額，故用 Number）。
 * current/monthly/target 為 TWD 數字；annualRatePct 例如 7。
 * 回 { alreadyReached, reachable, months, years, days }。
 */
function projectRetirement(current, monthly, annualRatePct, target) {
  current = Number(current) || 0; monthly = Number(monthly) || 0;
  target = Number(target) || 0; annualRatePct = Number(annualRatePct) || 0;
  if (target <= 0) return { reachable: false };
  if (current >= target) return { alreadyReached: true, reachable: true, months: 0, years: 0, days: 0 };
  const i = annualRatePct / 100 / 12;
  let n;
  if (i <= 0) {
    if (monthly <= 0) return { reachable: false };
    n = (target - current) / monthly;
  } else {
    const a = current + monthly / i;
    const b = target + monthly / i;
    if (a <= 0) {
      if (monthly <= 0) return { reachable: false };
      n = (target - current) / monthly; // 極端負值退回線性估計
    } else {
      const x = b / a; // (1+i)^n
      if (x <= 1) return { reachable: false };
      n = Math.log(x) / Math.log(1 + i);
    }
  }
  if (!isFinite(n) || n < 0) return { reachable: false };
  return { alreadyReached: false, reachable: true, months: n, years: n / 12, days: Math.round(n / 12 * 365.25) };
}

/* Node 測試環境輸出（瀏覽器中 module 不存在，此段不執行） */
if (typeof module !== 'undefined' && module.exports) {
  module.exports = { DEC_ONE, DEC_ZERO, DEC_HUNDRED, decParse, decRoundDiv, decAdd, decSub, decMul, decDiv, decToFixed, decFormat, decFormatQty, computePositions, summarizeCurrencies, toTwdUnits, aggregateRealized, projectRetirement };
}

<script>
'use strict';

const APP_VERSION = '1.4.0';

const LS = {
  api: 'etf.apiUrl',
  key: 'etf.secretKey',
  tx: 'etf.cache.transactions',
  px: 'etf.cache.prices',
  syncedAt: 'etf.cache.syncedAt',
  retire: 'etf.retire'
};

const CURRENCY_PREFIX = { USD: 'US$', TWD: 'NT$' };
const MARKET_LABEL = { US: '美股', TW: '台股' };

const state = {
  tx: [],            // 交易列表（伺服器或快取）
  px: {},            // symbol → {price, currency, updatedAt, dataSource, stale, error}
  txFromCache: true, // true = 目前顯示的是本機快取，非本次同步結果
  pxFromCache: true,
  lastSync: null,    // 最後成功同步時間 ms
  loading: false
};

// ---------- 小工具 ----------

function $(id) { return document.getElementById(id); }

function el(tag, attrs = {}, children = []) {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') node.className = v;
    else if (k === 'text') node.textContent = v;
    else node.setAttribute(k, v);
  }
  for (const c of [].concat(children)) {
    if (c === null || c === undefined) continue;
    node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return node;
}

let toastTimer = null;
function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}

function uuid() {
  if (crypto.randomUUID) return crypto.randomUUID();
  const b = crypto.getRandomValues(new Uint8Array(16));
  b[6] = (b[6] & 0x0f) | 0x40;
  b[8] = (b[8] & 0x3f) | 0x80;
  const h = [...b].map(x => x.toString(16).padStart(2, '0')).join('');
  return `${h.slice(0,8)}-${h.slice(8,12)}-${h.slice(12,16)}-${h.slice(16,20)}-${h.slice(20)}`;
}

function pad2(n) { return String(n).padStart(2, '0'); }

function formatDateNum(n) { // 20260712 → 2026/07/12
  const s = String(n);
  if (!/^\d{8}$/.test(s)) return s;
  return `${s.slice(0,4)}/${s.slice(4,6)}/${s.slice(6,8)}`;
}

function formatTime(ms) {
  if (!ms || !isFinite(ms)) return '';
  const d = new Date(ms);
  return `${pad2(d.getMonth()+1)}/${pad2(d.getDate())} ${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
}

function dateInputToNum(v) { // '2026-07-12' → 20260712
  if (!/^\d{4}-\d{2}-\d{2}$/.test(v)) return null;
  return Number(v.replace(/-/g, ''));
}

function loadCache(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch { return fallback; }
}

function saveCache(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch { /* 空間不足時不阻斷使用 */ }
}

// ---------- API ----------

function hasConfig() {
  return Boolean(localStorage.getItem(LS.api) && localStorage.getItem(LS.key));
}

async function api(action, payload) {
  const url = localStorage.getItem(LS.api);
  const key = localStorage.getItem(LS.key);
  if (!url || !key) throw new Error('尚未設定 API 網址與 Secret Key');
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 25000);
  try {
    // body 為字串、未指定 Content-Type（text/plain）→ 簡單請求，不觸發 CORS preflight
    const res = await fetch(url, {
      method: 'POST',
      body: JSON.stringify({ key, action, payload }),
      signal: controller.signal
    });
    if (!res.ok) throw new Error(`伺服器回應 HTTP ${res.status}`);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error === 'unauthorized' ? 'Secret Key 錯誤或未設定' : (data.error || '未知錯誤'));
    return data;
  } catch (err) {
    if (err.name === 'AbortError') throw new Error('連線逾時（25 秒）');
    throw err;
  } finally {
    clearTimeout(timer);
  }
}

// ---------- 資料同步 ----------

async function refreshData(showToastOnSuccess) {
  if (state.loading) return;
  if (!hasConfig()) {
    switchView('settings');
    toast('請先完成連線設定');
    return;
  }
  state.loading = true;
  $('btn-refresh').classList.add('spinning');
  setSyncStatus('同步中…');

  let txError = null, pxError = null;

  try {
    const data = await api('listTransactions');
    state.tx = data.transactions || [];
    state.txFromCache = false;
    saveCache(LS.tx, state.tx);
  } catch (err) {
    txError = err.message;
    state.tx = loadCache(LS.tx, []);
    state.txFromCache = true;
  }

  const symbols = uniqueSymbols(state.tx);
  if (symbols.length > 0) {
    try {
      const data = await api('getPrices', { symbols });
      const map = {};
      for (const p of (data.prices || [])) map[p.symbol] = p;
      state.px = map;
      state.pxFromCache = false;
      saveCache(LS.px, state.px);
    } catch (err) {
      pxError = err.message;
      state.px = loadCache(LS.px, {});
      state.pxFromCache = true;
    }
  } else {
    state.px = {};
    state.pxFromCache = false;
  }

  if (!txError && !pxError) {
    state.lastSync = Date.now();
    saveCache(LS.syncedAt, state.lastSync);
    if (showToastOnSuccess) toast('已更新');
  } else {
    toast(`部分資料未更新：${txError || pxError}（顯示為快取值）`);
  }

  state.loading = false;
  $('btn-refresh').classList.remove('spinning');
  render();
}

function uniqueSymbols(txs) {
  const seen = new Map();
  for (const t of txs) {
    if (t.symbol && !seen.has(t.symbol)) seen.set(t.symbol, { symbol: t.symbol, market: t.market });
  }
  return [...seen.values()];
}

function setSyncStatus(text) { $('sync-status').textContent = text; }

function updateSyncStatusLine() {
  const parts = [];
  if (state.lastSync) parts.push(`最後同步 ${formatTime(state.lastSync)}`);
  const hasData = state.tx.length > 0 || Object.keys(state.px).length > 0;
  if (hasData && (state.txFromCache || state.pxFromCache)) parts.push('⚠ 顯示本機快取資料（非即時）');
  setSyncStatus(parts.join('　'));
}

// ---------- 持倉計算（委派給 money-math 的純函式引擎）----------

/** 把 state.px 轉成引擎要的 priceMap，並把「整批快取」也視為 stale。 */
function currentPriceMap() {
  const m = {};
  for (const [sym, px] of Object.entries(state.px)) {
    m[sym] = { price: px.price, updatedAt: px.updatedAt, dataSource: px.dataSource,
               stale: Boolean(px.stale) || state.pxFromCache };
  }
  return m;
}

function computePortfolio() { return computePositions(state.tx, currentPriceMap()); }

// ---------- 畫面 ----------

const VIEW_TITLES = { overview: '總覽', transactions: '交易紀錄', add: '新增交易', retirement: '獲利與退休', settings: '設定' };

function switchView(name) {
  for (const m of document.querySelectorAll('main')) m.classList.remove('active');
  $(`view-${name}`).classList.add('active');
  for (const b of document.querySelectorAll('nav button')) {
    b.classList.toggle('active', b.dataset.view === name);
  }
  $('view-title').textContent = VIEW_TITLES[name];
  window.scrollTo(0, 0);
}

function plClass(units) { return units < 0n ? 'down' : 'up'; }
function plSign(units) { return units < 0n ? '' : '+'; }

function render() {
  renderOverview();
  renderTransactions();
  renderRetirement();
  updateSyncStatusLine();
}

// ---------- 退休設定存取 ----------

function getRetire() {
  const d = loadCache(LS.retire, {}) || {};
  return {
    target: d.target || '', monthly: d.monthly || '',
    rate: (d.rate === undefined || d.rate === '') ? '7' : String(d.rate),
    fx: d.fx || '', extra: d.extra || '0', age: d.age || ''
  };
}

function unitsToNum(units) { return Number(decToFixed(units, 2)); }

function htmlNode(html) {
  const d = document.createElement('div');
  d.innerHTML = html.trim();
  return d.firstElementChild;
}

function donutSvg(pctNum) {
  const p = Math.max(0, Math.min(100, pctNum));
  const r = 52, c = 2 * Math.PI * r, off = c * (1 - p / 100);
  return `<svg viewBox="0 0 140 140" width="130" height="130" aria-hidden="true">
    <circle cx="70" cy="70" r="${r}" fill="none" stroke="#E5E7EB" stroke-width="14"/>
    <circle cx="70" cy="70" r="${r}" fill="none" stroke="#16A34A" stroke-width="14" stroke-linecap="round"
      stroke-dasharray="${c.toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}" transform="rotate(-90 70 70)"/>
    <text x="70" y="66" text-anchor="middle" font-size="22" font-weight="800" fill="#16A34A">${p.toFixed(1)}%</text>
    <text x="70" y="88" text-anchor="middle" font-size="11" fill="#6B7280">完成度</text>
  </svg>`;
}

function todayNum() {
  const d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
}

function retireEmpty(root, msg) {
  root.appendChild(el('div', { class: 'empty', text: msg }));
  const btn = el('button', { class: 'btn-primary', type: 'button', text: '前往退休設定' });
  btn.style.maxWidth = '260px';
  btn.style.margin = '0 auto';
  btn.style.display = 'block';
  btn.addEventListener('click', () => switchView('settings'));
  root.appendChild(btn);
}

function statBox(k, v, cls) {
  return el('div', {}, [el('div', { class: 'k', text: k }), el('div', { class: `v ${cls || ''}`, text: v })]);
}

function renderRetirement() {
  const root = $('view-retirement');
  root.replaceChildren();
  if (!hasConfig()) {
    root.appendChild(el('div', { class: 'empty', text: '尚未完成連線設定，請先到「設定」分頁完成連線。' }));
    return;
  }
  const rs = getRetire();
  const targetUnits = decParse(rs.target);
  if (targetUnits === null || targetUnits <= 0n) {
    retireEmpty(root, '尚未設定退休目標金額。設定後即可看到完成率與預估達標時間。');
    return;
  }

  const { positions, realizedEvents } = computePortfolio();
  const fxUnits = decParse(rs.fx); // null = 未設匯率
  let fxMissing = false, priceMissing = false;
  const conv = (units, currency) => {
    const t = toTwdUnits(units, currency, fxUnits);
    if (t === null) { fxMissing = true; return DEC_ZERO; }
    return t;
  };

  let assets = DEC_ZERO, investedTwd = DEC_ZERO, unrealizedTwd = DEC_ZERO;
  for (const p of positions) {
    if (p.qty <= 0n) continue;
    investedTwd = decAdd(investedTwd, conv(p.cost, p.currency));
    if (p.price === null) { priceMissing = true; continue; }
    assets = decAdd(assets, conv(p.marketValue, p.currency));
    unrealizedTwd = decAdd(unrealizedTwd, conv(p.unrealized, p.currency));
  }
  const extraUnits = decParse(rs.extra);
  if (extraUnits !== null && extraUnits > 0n) assets = decAdd(assets, extraUnits);

  const realizedAgg = aggregateRealized(realizedEvents, todayNum(), fxUnits);
  if (realizedAgg.fxMissing) fxMissing = true;
  const lifetime = decAdd(realizedAgg.all, unrealizedTwd);

  const pct = decMul(decDiv(assets, targetUnits), DEC_HUNDRED);
  const pctNum = unitsToNum(pct);
  const remaining = decSub(targetUnits, assets);

  // ===== 頂部：退休目標總覽 =====
  const hero = el('div', { class: 'ret-hero' });
  hero.appendChild(el('div', { class: 'label', text: '目前退休資產（TWD 估算）' }));
  hero.appendChild(el('div', { class: 'big', text: `NT$ ${decFormat(assets)}` }));
  hero.appendChild(el('div', { class: 'target', text: `退休目標 NT$ ${decFormat(targetUnits)}` }));
  const bar = el('div', { class: 'progress' });
  bar.appendChild(el('span', { style: `width:${Math.max(0, Math.min(100, pctNum))}%` }));
  hero.appendChild(bar);
  hero.appendChild(el('div', { class: 'pctline' }, [
    el('div', { text: `完成 ${decToFixed(pct, 2)}%` }),
    el('div', { text: remaining <= 0n ? '🎉 已達標' : `還差 NT$ ${decFormat(remaining)}` })
  ]));
  root.appendChild(hero);

  // ===== 甜甜圈 + 預估退休倒數 =====
  const monthlyNum = rs.monthly ? unitsToNum(decParse(rs.monthly) || DEC_ZERO) : 0;
  const rateNum = Number(rs.rate) || 0;
  const proj = projectRetirement(unitsToNum(assets), monthlyNum, rateNum, unitsToNum(targetUnits));

  const donutCard = el('div', { class: 'card' });
  const dw = el('div', { class: 'donut-wrap' });
  dw.appendChild(htmlNode(donutSvg(pctNum)));
  const legend = el('div', { class: 'legend' });
  legend.appendChild(el('div', {}, [`目前：`, el('b', { text: `NT$ ${decFormat(assets)}` })]));
  legend.appendChild(el('div', {}, [`目標：`, el('b', { text: `NT$ ${decFormat(targetUnits)}` })]));
  legend.appendChild(el('div', {}, [`每月投入：`, el('b', { text: `NT$ ${decFormat(decParse(rs.monthly) || DEC_ZERO)}` })]));
  legend.appendChild(el('div', {}, [`預期年化：`, el('b', { text: `${decToFixed(decParse(rs.rate) || DEC_ZERO, 1)}%` })]));
  dw.appendChild(legend);
  donutCard.appendChild(dw);
  root.appendChild(donutCard);

  const cdCard = el('div', { class: 'card' });
  cdCard.appendChild(el('div', { class: 'section-title', style: 'margin-top:0', text: '預估退休倒數' }));
  if (proj.alreadyReached) {
    cdCard.appendChild(el('div', { class: 'empty', text: '🎉 目前資產已達到退休目標！' }));
  } else if (!proj.reachable) {
    cdCard.appendChild(el('div', { class: 'hint', text: '依目前資產、每月投入與報酬率無法估算達標時間（請在設定填入每月投入與預期年化報酬率）。' }));
  } else {
    const d = new Date(Date.now() + proj.days * 86400000);
    const fullY = Math.floor(proj.years);
    const remD = Math.max(0, Math.round((proj.years - fullY) * 365.25));
    const cd = el('div', { class: 'countdown' });
    cd.appendChild(el('div', {}, [el('div', { class: 'num', text: `${d.getFullYear()}/${pad2(d.getMonth()+1)}/${pad2(d.getDate())}` }), el('div', { class: 'cap', text: '預估退休日期' })]));
    cd.appendChild(el('div', {}, [el('div', { class: 'num', text: `${fullY} 年 ${remD} 天` }), el('div', { class: 'cap', text: '距離退休' })]));
    cd.appendChild(el('div', {}, [el('div', { class: 'num', text: `${proj.days.toLocaleString()}` }), el('div', { class: 'cap', text: '共剩餘（天）' })]));
    cdCard.appendChild(cd);
    cdCard.appendChild(el('div', { class: 'hint', text: `依複利模型：目前 NT$ ${decFormat(assets)}，每月投入 NT$ ${decFormat(decParse(rs.monthly) || DEC_ZERO)}，年化 ${decToFixed(decParse(rs.rate) || DEC_ZERO, 1)}%。為估算值，非保證。` }));
  }
  root.appendChild(cdCard);

  // ===== 已實現獲利 本月/今年/歷史 =====
  root.appendChild(el('div', { class: 'section-title', text: '已實現獲利（TWD 估算）' }));
  const three = el('div', { class: 'three' });
  three.appendChild(el('div', {}, [el('div', { class: 'k', text: '本月' }), el('div', { class: `v ${plClass(realizedAgg.month)}`, text: `${plSign(realizedAgg.month)}${decFormat(realizedAgg.month)}` })]));
  three.appendChild(el('div', {}, [el('div', { class: 'k', text: '今年' }), el('div', { class: `v ${plClass(realizedAgg.year)}`, text: `${plSign(realizedAgg.year)}${decFormat(realizedAgg.year)}` })]));
  three.appendChild(el('div', {}, [el('div', { class: 'k', text: '歷史累積' }), el('div', { class: `v ${plClass(realizedAgg.all)}`, text: `${plSign(realizedAgg.all)}${decFormat(realizedAgg.all)}` })]));
  root.appendChild(three);

  // ===== 累積投資成果 4 張卡 =====
  root.appendChild(el('div', { class: 'section-title', text: '累積投資成果（TWD 估算）' }));
  const grid = el('div', { class: 'stat-grid' });
  grid.appendChild(statBox('目前投入本金', `NT$ ${decFormat(investedTwd)}`));
  grid.appendChild(statBox('累積已實現獲利', `${plSign(realizedAgg.all)}${decFormat(realizedAgg.all)}`, plClass(realizedAgg.all)));
  grid.appendChild(statBox('目前未實現損益', `${plSign(unrealizedTwd)}${decFormat(unrealizedTwd)}`, plClass(unrealizedTwd)));
  grid.appendChild(statBox('投資生涯總獲利', `${plSign(lifetime)}${decFormat(lifetime)}`, plClass(lifetime)));
  root.appendChild(grid);

  // ===== 警告 =====
  if (fxMissing) {
    root.appendChild(el('div', { class: 'setup-banner', text: '⚠ 你有美元（USD）資產或已實現獲利，但尚未設定 USD→TWD 匯率，這些金額未計入上方 TWD 總計。請到設定填入匯率。' }));
  }
  if (priceMissing) {
    root.appendChild(el('div', { class: 'hint', text: '⚠ 有持倉目前無報價，未計入退休資產。' }));
  }

  // ===== 賣出紀錄 =====
  const sells = [...realizedEvents].sort((a, b) => (b.tradeDate - a.tradeDate) || (b.createdAt - a.createdAt));
  root.appendChild(el('div', { class: 'section-title', text: `已賣出投資紀錄（${sells.length}）` }));
  if (sells.length === 0) {
    root.appendChild(el('div', { class: 'hint', text: '目前還沒有賣出紀錄。賣出後這裡會列出每筆的已實現獲利與報酬率。' }));
  }
  for (const e of sells) {
    const prefix = CURRENCY_PREFIX[e.currency] || e.currency;
    const item = el('div', { class: 'holding' });
    item.style.cursor = 'default';
    const top = el('div', { class: 'top' });
    top.appendChild(el('div', {}, [
      el('div', { class: 'symbol', text: e.symbol }),
      el('div', { class: 'name', text: `${e.name || ''}${e.name ? '　' : ''}${MARKET_LABEL[e.market] || e.market}　${formatDateNum(e.tradeDate)}` })
    ]));
    top.appendChild(el('div', { class: `pl ${plClass(e.realized)}` }, [
      `${plSign(e.realized)}${prefix} ${decFormat(e.realized)}`,
      el('div', { class: 'pl-pct', text: e.realizedPct === null ? '' : `${plSign(e.realizedPct)}${decToFixed(e.realizedPct, 2)}%` })
    ]));
    item.appendChild(top);
    const mid = el('div', { class: 'mid' });
    mid.appendChild(el('div', { text: `賣 ${decFormatQty(e.sellQty)} 股 @ ${decFormat(e.sellPrice)}（均成本 ${decFormat(e.avgCost)}）` }));
    mid.appendChild(el('div', { class: 'mv', text: `收入 ${prefix} ${decFormat(e.proceeds)}` }));
    item.appendChild(mid);
    const costs = [`成本 ${decFormat(e.buyCost)}`];
    if (e.fee > 0n) costs.push(`手續費 ${decFormat(e.fee)}`);
    if (e.tax > 0n) costs.push(`稅 ${decFormat(e.tax)}`);
    item.appendChild(el('div', { class: 'price-line' }, [el('div', { text: costs.join('｜') }), el('div', {})]));
    root.appendChild(item);
  }
}

function renderOverview() {
  const root = $('view-overview');
  root.replaceChildren();

  if (!hasConfig()) {
    root.appendChild(el('div', { class: 'empty', text: '尚未完成連線設定，請到「設定」分頁填入 API 網址與 Secret Key。' }));
    return;
  }
  if (state.tx.length === 0) {
    root.appendChild(el('div', { class: 'empty', text: '還沒有任何交易紀錄。點下方「新增」開始記錄第一筆。' }));
    return;
  }

  const { positions, skipped } = computePortfolio();
  const summaries = summarizeCurrencies(positions);
  const holdings = positions.filter(p => p.qty > 0n); // 只列續抱的

  for (const s of summaries) {
    const prefix = CURRENCY_PREFIX[s.currency] || s.currency;
    const card = el('div', { class: 'asset-card' });
    card.appendChild(el('div', { class: 'label', text: `總資產（${s.currency}）` }));
    card.appendChild(el('div', { class: 'total', text: `${prefix} ${decFormat(s.marketValue)}` }));
    const row = el('div', { class: 'row' });
    row.appendChild(el('div', {}, [
      el('div', { class: 'sub-label', text: '投入本金' }),
      el('div', { class: 'sub-value', text: decFormat(s.invested) })
    ]));
    row.appendChild(el('div', {}, [
      el('div', { class: 'sub-label', text: '未實現損益' }),
      el('div', { class: 'sub-value', text: `${plSign(s.unrealized)}${decFormat(s.unrealized)}` })
    ]));
    row.appendChild(el('div', {}, [
      el('div', { class: 'sub-label', text: '報酬率' }),
      el('div', { class: 'sub-value', text: s.unrealizedPct === null ? '—' : `${plSign(s.unrealizedPct)}${decToFixed(s.unrealizedPct, 2)}%` })
    ]));
    card.appendChild(row);
    if (s.hasSell || s.realized !== 0n) {
      card.appendChild(el('div', { class: 'warn', text: `已實現損益 ${plSign(s.realized)}${decFormat(s.realized)}（賣出已入袋，含扣手續費與稅）` }));
    }
    if (s.feesAndTax > 0n) {
      card.appendChild(el('div', { class: 'warn', text: `累積手續費/稅 ${prefix} ${decFormat(s.feesAndTax)}（買入已計入成本、賣出已扣損益）` }));
    }
    if (s.missingPriceCount > 0) {
      card.appendChild(el('div', { class: 'warn', text: `${s.missingPriceCount} 檔持倉目前無報價，總資產與損益未包含該部位。` }));
    }
    if (s.hasStale) {
      card.appendChild(el('div', { class: 'warn', text: '部分報價非即時（顯示最後成功抓到的價格）。' }));
    }
    root.appendChild(card);
  }

  const investedByCurrency = {};
  for (const s of summaries) investedByCurrency[s.currency] = s.invested;

  if (holdings.length === 0) {
    root.appendChild(el('div', { class: 'empty', text: '目前沒有續抱的持倉（已全部賣出）。已實現損益顯示於上方卡片。' }));
  } else {
    root.appendChild(el('div', { class: 'section-title', text: `我的持倉（${holdings.length}）` }));
  }

  for (const h of holdings) {
    const prefix = CURRENCY_PREFIX[h.currency] || h.currency;
    const ccyInvested = investedByCurrency[h.currency] || DEC_ZERO;
    const weight = ccyInvested > 0n ? decMul(decDiv(h.cost, ccyInvested), DEC_HUNDRED) : null;
    const item = el('div', { class: 'holding' });
    item.addEventListener('click', () => openHoldingDetail(h.symbol, h.currency));

    const top = el('div', { class: 'top' });
    const left = el('div', {}, [
      el('div', { class: 'symbol' }, [
        h.symbol,
        h.price === null ? el('span', { class: 'badge-noprice', text: '無報價' }) :
          (h.priceStale ? el('span', { class: 'badge-stale', text: '非即時' }) : null)
      ]),
      el('div', { class: 'name', text: `${h.name || ''}${h.name ? '　' : ''}${MARKET_LABEL[h.market] || h.market}` })
    ]);
    top.appendChild(left);
    if (h.price !== null) {
      top.appendChild(el('div', { class: `pl ${plClass(h.unrealized)}` }, [
        `${plSign(h.unrealized)}${decFormat(h.unrealized)}`,
        el('div', { class: 'pl-pct', text: h.unrealizedPct === null ? '' : `${plSign(h.unrealizedPct)}${decToFixed(h.unrealizedPct, 2)}%` })
      ]));
    }
    item.appendChild(top);

    const mid = el('div', { class: 'mid' });
    mid.appendChild(el('div', { text: `${decFormatQty(h.qty)} 股｜均價 ${decFormat(h.avgCost)}` }));
    mid.appendChild(el('div', { class: 'mv', text: h.price === null ? `成本 ${prefix} ${decFormat(h.cost)}` : `${prefix} ${decFormat(h.marketValue)}` }));
    item.appendChild(mid);

    if (h.price !== null) {
      const pl = el('div', { class: 'price-line' });
      pl.appendChild(el('div', { text: `現價 ${decFormat(h.price)}` }));
      pl.appendChild(el('div', { text: `更新 ${formatTime(h.priceUpdatedAt)}${h.dataSource ? '（' + h.dataSource + '）' : ''}` }));
      item.appendChild(pl);
    }

    if (weight !== null) {
      const wl = el('div', { class: 'price-line' });
      const realizedNote = h.realized !== 0n ? `｜已實現 ${plSign(h.realized)}${decFormat(h.realized)}` : '';
      wl.appendChild(el('div', { text: `佔 ${h.currency} 部位 ${decToFixed(weight, 1)}%${realizedNote}` }));
      wl.appendChild(el('div', { class: 'chev', text: '查看明細 ›' }));
      item.appendChild(wl);
      const bar = el('div', { class: 'weight-bar' });
      bar.appendChild(el('span', { style: `width:${Math.min(100, Number(decToFixed(weight, 1)))}%` }));
      item.appendChild(bar);
    }
    root.appendChild(item);
  }

  // 集中度提醒（同幣別內單一續抱持倉佔比過高）
  for (const s of summaries) {
    if (s.heldCount < 2 || s.invested <= 0n) continue;
    let topW = null, topSym = '';
    for (const h of holdings) {
      if (h.currency !== s.currency) continue;
      const w = decMul(decDiv(h.cost, s.invested), DEC_HUNDRED);
      if (topW === null || w > topW) { topW = w; topSym = h.symbol; }
    }
    if (topW !== null && topW >= decParse('60')) { // ≥ 60%（定點值，60×1e8）
      root.appendChild(el('div', { class: 'setup-banner', text: `⚠ ${s.currency} 部位中 ${topSym} 佔 ${decToFixed(topW, 1)}%，集中度偏高，長期投資可留意分散。` }));
    }
  }

  if (positions.some(p => p.oversold)) {
    root.appendChild(el('div', { class: 'hint', text: '⚠ 有賣出數量超過當時持股，已只計實際持有部分。請檢查交易紀錄。' }));
  }
  if (skipped.length > 0) {
    root.appendChild(el('div', { class: 'hint', text: `⚠ ${skipped.length} 筆交易的數字欄位無法解析，已略過不計（請到 Google Sheet 檢查）。` }));
  }
}

function renderTransactions() {
  const root = $('view-transactions');
  root.replaceChildren();
  if (state.tx.length === 0) {
    root.appendChild(el('div', { class: 'empty', text: '還沒有任何交易紀錄。' }));
    return;
  }
  const sorted = [...state.tx].sort((a, b) => (b.tradeDate - a.tradeDate) || (b.createdAt - a.createdAt));
  for (const t of sorted) {
    const prefix = CURRENCY_PREFIX[t.currency] || t.currency;
    const isSell = t.type === 'sell';
    const p = decParse(t.price);
    const q = decParse(t.quantity);
    const f = decParse(t.fee === '' ? '0' : t.fee) ?? DEC_ZERO;
    const tax = decParse(t.tax === '' || t.tax == null ? '0' : t.tax) ?? DEC_ZERO;
    // 買入：現金流出＝價×量＋手續費＋稅；賣出：現金流入＝價×量−手續費−稅
    const gross = (p !== null && q !== null) ? decMul(p, q) : null;
    const total = gross === null ? null : (isSell ? decSub(decSub(gross, f), tax) : decAdd(decAdd(gross, f), tax));

    const row = el('div', { class: 'tx-row' });
    row.addEventListener('click', () => openTxEditor(t));
    const line1 = el('div', { class: 'line1' });
    line1.appendChild(el('div', { class: 'sym' }, [
      t.symbol,
      el('span', { class: 'tx-badge', style: isSell ? 'background:#FEE2E2;color:#B91C1C' : '', text: isSell ? '賣出' : '買入' })
    ]));
    line1.appendChild(el('div', { class: `amount ${isSell ? 'up' : ''}`, text: total === null ? '—' : `${isSell ? '+' : '-'}${prefix} ${decFormat(total)}` }));
    row.appendChild(line1);

    const line2 = el('div', { class: 'line2' });
    line2.appendChild(el('div', { text: formatDateNum(t.tradeDate) }));
    const costs = [];
    if (f > 0n) costs.push('手續費 ' + decFormat(f));
    if (tax > 0n) costs.push('稅 ' + decFormat(tax));
    line2.appendChild(el('div', { text: `${decFormatQty(q ?? DEC_ZERO)} 股 @ ${p === null ? '?' : decFormat(p)}${costs.length ? '｜' + costs.join('、') : ''}` }));
    row.appendChild(line2);

    if (t.note) row.appendChild(el('div', { class: 'note', text: `備註：${t.note}` }));
    root.appendChild(row);
  }
}

// ---------- 新增交易 ----------

let editingId = null; // null = 新增模式；有值 = 編輯該筆交易

function numToDateInput(n) { // 20260713 → '2026-07-13'
  const s = String(n);
  if (!/^\d{8}$/.test(s)) return new Date().toISOString().slice(0, 10);
  return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
}

let addType = 'buy'; // 'buy' | 'sell'

function setAddType(type) {
  addType = type === 'sell' ? 'sell' : 'buy';
  const buyBtn = document.querySelector('#type-seg button[data-type="buy"]');
  const sellBtn = document.querySelector('#type-seg button[data-type="sell"]');
  buyBtn.className = addType === 'buy' ? 'on-buy' : '';
  sellBtn.className = addType === 'sell' ? 'on-sell' : '';
  $('btn-save').textContent = editingId ? '儲存修改' : (addType === 'sell' ? '儲存賣出紀錄' : '儲存買入紀錄');
  $('f-tax-label').textContent = addType === 'sell' ? '稅（如證交稅）' : '稅（賣出用）';
  updateAvailHint();
}

/** 計算某代號目前持有股數（可排除某筆，供編輯時檢查超賣）。 */
function heldQty(symbol, currency, excludeId) {
  const txs = excludeId ? state.tx.filter(t => t.id !== excludeId) : state.tx;
  const { positions } = computePositions(txs, {});
  const p = positions.find(x => x.symbol === symbol && x.currency === currency);
  return p ? p.qty : DEC_ZERO;
}

function updateAvailHint() {
  const hintEl = $('avail-hint');
  if (addType !== 'sell') { hintEl.textContent = ''; return; }
  const symbol = $('f-symbol').value.trim().toUpperCase();
  const currency = $('f-currency').value;
  if (!symbol) { hintEl.textContent = '賣出：請先輸入你持有的代號'; return; }
  const held = heldQty(symbol, currency, editingId);
  hintEl.textContent = held > 0n
    ? `目前可賣：${decFormatQty(held)} 股（${symbol} · ${currency}）`
    : `⚠ 你目前沒有持有 ${symbol}（${currency}）`;
}

function resetAddForm() {
  editingId = null;
  const form = $('add-form');
  form.reset();
  $('f-date').value = new Date().toISOString().slice(0, 10);
  $('f-fee').value = '0';
  $('f-tax').value = '0';
  $('f-currency').value = $('f-market').value === 'TW' ? 'TWD' : 'USD';
  $('btn-delete').style.display = 'none';
  setAddType('buy');
  $('add-hint').textContent = '買入或賣出皆可記錄。賣出會用加權平均成本自動算已實現損益。';
}

function openTxEditor(t) {
  closeModal();
  editingId = t.id;
  $('f-symbol').value = t.symbol;
  $('f-market').value = t.market;
  $('f-name').value = t.name || '';
  $('f-date').value = numToDateInput(t.tradeDate);
  $('f-price').value = t.price;
  $('f-quantity').value = t.quantity;
  $('f-fee').value = (t.fee === '' || t.fee === undefined) ? '0' : t.fee;
  $('f-tax').value = (t.tax === '' || t.tax == null) ? '0' : t.tax;
  $('f-currency').value = t.currency;
  $('f-note').value = t.note || '';
  $('btn-delete').style.display = 'block';
  setAddType(t.type === 'sell' ? 'sell' : 'buy');
  $('add-hint').textContent = '修改後會覆蓋原紀錄（原始建立時間保留）。';
  switchView('add');
  $('view-title').textContent = '編輯交易';
}

function initAddForm() {
  const form = $('add-form');
  $('f-date').value = new Date().toISOString().slice(0, 10);

  for (const b of document.querySelectorAll('#type-seg button')) {
    b.addEventListener('click', () => setAddType(b.dataset.type));
  }
  $('f-market').addEventListener('change', () => {
    $('f-currency').value = $('f-market').value === 'TW' ? 'TWD' : 'USD';
    updateAvailHint();
  });
  $('f-symbol').addEventListener('input', updateAvailHint);
  $('f-currency').addEventListener('change', updateAvailHint);

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const symbol = $('f-symbol').value.trim().toUpperCase();
    const market = $('f-market').value;
    const name = $('f-name').value.trim();
    const tradeDate = dateInputToNum($('f-date').value);
    const price = $('f-price').value.trim();
    const quantity = $('f-quantity').value.trim();
    const fee = $('f-fee').value.trim() || '0';
    const tax = $('f-tax').value.trim() || '0';
    const currency = $('f-currency').value;
    const note = $('f-note').value.trim();
    const type = addType;

    if (!/^[A-Z0-9.]{1,16}$/.test(symbol)) return toast('代號格式不正確（英數字，例：VOO、0050）');
    if (tradeDate === null) return toast('請選擇交易日期');
    const pU = decParse(price), qU = decParse(quantity), fU = decParse(fee), tU = decParse(tax);
    if (pU === null || pU <= 0n) return toast('價格必須是大於 0 的數字');
    if (qU === null || qU <= 0n) return toast('數量必須是大於 0 的數字');
    if (fU === null || fU < 0n) return toast('手續費必須是 0 或正數');
    if (tU === null || tU < 0n) return toast('稅必須是 0 或正數');

    if (type === 'sell') {
      const avail = heldQty(symbol, currency, editingId);
      if (avail <= 0n) return toast(`你目前沒有持有 ${symbol}（${currency}），無法賣出`);
      if (qU > avail) return toast(`賣出數量超過持有（目前可賣 ${decFormatQty(avail)} 股）`);
    }

    const isEdit = Boolean(editingId);
    const action = isEdit ? 'updateTransaction' : 'addTransaction';
    const payload = { id: editingId || uuid(), tradeDate, symbol, name, market, price, quantity, fee, currency, note, type, tax };

    const btn = $('btn-save');
    const original = btn.textContent;
    btn.disabled = true;
    btn.textContent = '儲存中…';
    try {
      await api(action, payload);
      toast(isEdit ? '已更新' : '已儲存');
      resetAddForm();
      switchView('overview');
      await refreshData(false);
    } catch (err) {
      toast(`儲存失敗：${err.message}`);
      btn.textContent = original;
    } finally {
      btn.disabled = false;
    }
  });

  $('btn-delete').addEventListener('click', async () => {
    if (!editingId) return;
    if (!confirm('確定刪除這筆交易？此動作無法復原。')) return;
    const btn = $('btn-delete');
    btn.disabled = true;
    btn.textContent = '刪除中…';
    try {
      await api('deleteTransaction', { id: editingId });
      toast('已刪除');
      resetAddForm();
      switchView('overview');
      await refreshData(false);
    } catch (err) {
      toast(`刪除失敗：${err.message}`);
    } finally {
      btn.disabled = false;
      btn.textContent = '刪除這筆交易';
    }
  });
}

// ---------- 持倉明細 modal ----------

function closeModal() {
  $('modal-overlay').classList.remove('show');
}

function statCell(k, v, cls) {
  return el('div', {}, [
    el('div', { class: 'k', text: k }),
    el('div', { class: `v ${cls || ''}`, text: v })
  ]);
}

function openHoldingDetail(symbol, currency) {
  const { positions } = computePortfolio();
  const h = positions.find(x => x.symbol === symbol && x.currency === currency);
  if (!h) return;
  const held = h.qty > 0n;
  const prefix = CURRENCY_PREFIX[currency] || currency;
  const txns = state.tx
    .filter(t => t.symbol === symbol && t.currency === currency)
    .sort((a, b) => (b.tradeDate - a.tradeDate) || (b.createdAt - a.createdAt));

  const body = $('modal-body');
  body.replaceChildren();

  const head = el('div', { class: 'modal-head' });
  head.appendChild(el('div', { class: 'sym' }, [
    symbol,
    !held ? el('span', { class: 'badge-stale', text: '已結清' }) :
      (h.price === null ? el('span', { class: 'badge-noprice', text: '無報價' }) :
        (h.priceStale ? el('span', { class: 'badge-stale', text: '非即時' }) : null))
  ]));
  const closeBtn = el('button', { class: 'close', 'aria-label': '關閉', text: '✕' });
  closeBtn.addEventListener('click', closeModal);
  head.appendChild(closeBtn);
  body.appendChild(head);

  body.appendChild(el('div', { class: 'modal-sub', text:
    `${h.name || ''}${h.name ? '　' : ''}${MARKET_LABEL[h.market] || h.market}　${currency}` +
    (held && h.price !== null ? `　現價 ${decFormat(h.price)}（更新 ${formatTime(h.priceUpdatedAt)}${h.dataSource ? '·' + h.dataSource : ''}）` : '')
  }));

  const grid = el('div', { class: 'stat-grid' });
  grid.appendChild(statCell('持有股數', `${decFormatQty(h.qty)} 股`));
  if (held) {
    grid.appendChild(statCell('平均成本', `${prefix} ${decFormat(h.avgCost)}`));
    grid.appendChild(statCell('剩餘成本', `${prefix} ${decFormat(h.cost)}`));
  }
  if (h.soldQty > 0n) {
    grid.appendChild(statCell('已實現損益', `${plSign(h.realized)}${decFormat(h.realized)}`, plClass(h.realized)));
    grid.appendChild(statCell('累計賣出', `${decFormatQty(h.soldQty)} 股`));
  }
  grid.appendChild(statCell('累積手續費/稅', `${prefix} ${decFormat(h.feesAndTax)}`));
  if (held && h.price !== null) {
    grid.appendChild(statCell('目前市值', `${prefix} ${decFormat(h.marketValue)}`));
    grid.appendChild(statCell('未實現損益', `${plSign(h.unrealized)}${decFormat(h.unrealized)}`, plClass(h.unrealized)));
    grid.appendChild(statCell('未實現報酬率', h.unrealizedPct === null ? '—' : `${plSign(h.unrealizedPct)}${decToFixed(h.unrealizedPct, 2)}%`, h.unrealizedPct === null ? '' : plClass(h.unrealizedPct)));
  }
  body.appendChild(grid);

  body.appendChild(el('div', { class: 'section-title', text: `交易紀錄（${txns.length}）· 點可編輯` }));
  for (const t of txns) {
    const isSell = t.type === 'sell';
    const p = decParse(t.price), q = decParse(t.quantity);
    const f = decParse(t.fee === '' ? '0' : t.fee) ?? DEC_ZERO;
    const tax = decParse(t.tax === '' || t.tax == null ? '0' : t.tax) ?? DEC_ZERO;
    const gross = (p !== null && q !== null) ? decMul(p, q) : null;
    const subtotal = gross === null ? null : (isSell ? decSub(decSub(gross, f), tax) : decAdd(decAdd(gross, f), tax));
    const lot = el('div', { class: 'lot' });
    lot.addEventListener('click', () => openTxEditor(t));
    const l1 = el('div', { class: 'l1' });
    l1.appendChild(el('div', {}, [
      el('span', { class: 'tx-badge', style: isSell ? 'background:#FEE2E2;color:#B91C1C' : '', text: isSell ? '賣' : '買' }),
      ` ${formatDateNum(t.tradeDate)}　${decFormatQty(q ?? DEC_ZERO)} 股 @ ${p === null ? '?' : decFormat(p)}`
    ]));
    l1.appendChild(el('div', { class: isSell ? 'up' : '', text: subtotal === null ? '' : `${isSell ? '+' : '-'}${prefix} ${decFormat(subtotal)}` }));
    lot.appendChild(l1);
    const parts = [];
    if (f > 0n) parts.push(`手續費 ${decFormat(f)}`);
    if (tax > 0n) parts.push(`稅 ${decFormat(tax)}`);
    if (t.note) parts.push(`備註：${t.note}`);
    lot.appendChild(el('div', { class: 'l2' }, [el('div', { text: parts.join('　') }), el('div', { text: '編輯 ›' })]));
    body.appendChild(lot);
  }

  $('modal-overlay').classList.add('show');
}

// ---------- 設定 ----------

function initSettings() {
  $('app-version').textContent = APP_VERSION;
  $('s-api').value = localStorage.getItem(LS.api) || '';
  $('s-key').value = localStorage.getItem(LS.key) || '';
  $('setup-banner').style.display = hasConfig() ? 'none' : 'block';

  $('settings-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const url = $('s-api').value.trim();
    const key = $('s-key').value.trim();
    if (!/^https:\/\/script\.google\.com\/macros\/s\/[\w-]+\/exec$/.test(url)) {
      return toast('API 網址格式不正確，應為 https://script.google.com/macros/s/…/exec');
    }
    if (key.length < 12) return toast('Secret Key 太短（至少 12 字元）');
    localStorage.setItem(LS.api, url);
    localStorage.setItem(LS.key, key);
    $('setup-banner').style.display = 'none';
    toast('設定已儲存');
    refreshData(true);
  });

  $('btn-test').addEventListener('click', async () => {
    try {
      await api('ping');
      toast('✓ 連線成功，Key 驗證通過');
    } catch (err) {
      toast(`連線失敗：${err.message}`);
    }
  });
}

function initRetireForm() {
  const rs = getRetire();
  $('r-target').value = rs.target;
  $('r-monthly').value = rs.monthly;
  $('r-rate').value = rs.rate;
  $('r-fx').value = rs.fx;
  $('r-extra').value = rs.extra === '0' ? '' : rs.extra;
  $('r-age').value = rs.age;

  $('retire-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const okNum = (v, allowEmpty) => {
      const s = String(v).trim();
      if (s === '') return allowEmpty ? '' : null;
      return /^\d+(\.\d+)?$/.test(s) ? s : null;
    };
    const target = okNum($('r-target').value, false);
    const monthly = okNum($('r-monthly').value, true);
    const rate = okNum($('r-rate').value, true);
    const fx = okNum($('r-fx').value, true);
    const extra = okNum($('r-extra').value, true);
    const age = okNum($('r-age').value, true);
    if (target === null || !(Number(target) > 0)) return toast('退休目標金額必須是大於 0 的數字');
    if (monthly === null) return toast('每月投入格式不正確');
    if (rate === null) return toast('年化報酬率格式不正確');
    if (fx === null) return toast('匯率格式不正確');
    if (extra === null) return toast('額外資產格式不正確');
    if (age === null) return toast('退休年齡格式不正確');

    saveCache(LS.retire, {
      target, monthly, rate: rate === '' ? '7' : rate, fx, extra: extra === '' ? '0' : extra, age
    });
    toast('退休設定已儲存');
    renderRetirement();
    switchView('retirement');
  });
}

// ---------- 啟動 ----------

function init() {
  for (const b of document.querySelectorAll('nav button')) {
    b.addEventListener('click', () => {
      if (b.dataset.view === 'add') resetAddForm(); // 從導覽進入一律是「新增」模式
      switchView(b.dataset.view);
    });
  }
  $('btn-refresh').addEventListener('click', () => refreshData(true));
  $('modal-overlay').addEventListener('click', (e) => { if (e.target.id === 'modal-overlay') closeModal(); });

  initAddForm();
  initSettings();
  initRetireForm();

  // 先用本機快取畫出畫面（標記非即時），再嘗試同步
  state.tx = loadCache(LS.tx, []);
  state.px = loadCache(LS.px, {});
  state.lastSync = loadCache(LS.syncedAt, null);
  render();

  if (hasConfig()) {
    refreshData(false);
  } else {
    switchView('settings');
  }
}

init();
</script>
